---
- name: Load congestion control modules (BBR)
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - tcp_bbr
    - sch_fq

- name: Apply Sysctl performance variables (Kernel Tuning)
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value | string }}"
    state: present
    sysctl_file: "/etc/sysctl.d/99-performance.conf"
  loop:
    - { key: "net.core.rmem_max", value: 16777216 }
    - { key: "net.core.wmem_max", value: 16777216 }
    - { key: "net.core.default_qdisc", value: "fq" }
    - { key: "net.ipv4.tcp_congestion_control", value: "bbr" }
    - { key: "net.ipv4.tcp_rmem", value: "4096 87380 16777216" }
    - { key: "net.ipv4.tcp_wmem", value: "4096 65536 16777216" }
    - { key: "net.ipv4.tcp_tw_reuse", value: 1 }
    - { key: "net.ipv4.tcp_fin_timeout", value: 15 }
    - { key: "net.ipv4.tcp_max_syn_backlog", value: 16384 }
    - { key: "net.core.somaxconn", value: 16384 }

- name: Set IRQ affinity to offload CPU Core 0 for high speed routing
  ansible.builtin.shell: |
    set -o pipefail
    for irq in $(grep -i "{{ network_interface }}" /proc/interrupts | awk '{print $1}' | tr -d ':'); do
      echo "{{ irq_affinity_mask }}" > "/proc/irq/$irq/smp_affinity"
    done
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
