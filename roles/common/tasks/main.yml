---
- name: Install system synchronization and monitoring tools
  ansible.builtin.package:
    name:
      - chrony
      - htop
      - iotop
      - curl
      - git
      - tmux
      - ufw
      - fail2ban
      - logrotate
    state: present

- name: Ensure Chrony (NTP) is enabled and running
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true

- name: Install prerequisites for Docker
  ansible.builtin.package:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
  when: ansible_os_family == "Debian"

- name: Add Docker GPG apt Key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  when: ansible_os_family == "Debian"

- name: Add Docker Repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
  when: ansible_os_family == "Debian"

- name: Install Docker Components
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Configure Fail2ban SSH jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    mode: '0644'
    content: |
      [sshd]
      enabled = true
      port = {{ ssh_port }}
      filter = sshd
      logpath = %(sshd_log)s
      backend = %(sshd_backend)s
      maxretry = {{ f2b_max_retry }}
      findtime = {{ f2b_find_time }}
      bantime = {{ f2b_ban_time }}
      banaction = ufw
  notify: Restart fail2ban

- name: Ensure Fail2ban is active
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true

- name: Configure UFW defaults
  ansible.builtin.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: 'incoming', policy: 'deny' }
    - { direction: 'outgoing', policy: 'allow' }
    - { direction: 'routed', policy: 'allow' }

- name: Allow SSH port through firewall
  ansible.builtin.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Enable UFW Firewall
  ansible.builtin.ufw:
    state: enabled
